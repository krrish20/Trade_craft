<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" rx="16" fill="hsl(var(--background))" />
  
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:hsl(var(--accent));stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:hsl(var(--primary));stop-opacity:0.2" />
    </linearGradient>
    <style>
      .fade-in {
        animation: fadeIn 1.5s ease-in-out forwards;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .line-draw {
        stroke-dasharray: 1000;
        stroke-dashoffset: 1000;
        animation: draw 3s ease-in-out forwards;
      }
      @keyframes draw {
        to { stroke-dashoffset: 0; }
      }
    </style>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#grad1)" />

  <g transform="translate(40, 50)">
    <path d="M 0 180 C 40 160, 80 120, 120 130 S 200 180, 240 160 S 320 80, 320 80" fill="none" stroke="hsl(var(--accent))" stroke-width="4" class="line-draw" style="animation-delay: 0.2s;" />
    
    <path d="M 0 150 C 30 140, 60 160, 90 150 S 150 110, 180 120 S 240 140, 270 120 S 320 100, 320 100" fill="none" stroke="hsl(var(--primary))" stroke-width="2" opacity="0.8" class="line-draw" />

    <g class="fade-in" style="animation-delay: 1s;">
      <rect x="50" y="20" width="100" height="50" rx="8" fill="hsl(var(--card))" stroke="hsl(var(--border))" />
      <text x="100" y="50" font-family="sans-serif" font-size="14" fill="hsl(var(--foreground))" text-anchor="middle">Chart</text>
    </g>

    <g class="fade-in" style="animation-delay: 1.2s;">
      <rect x="200" y="60" width="100" height="50" rx="8" fill="hsl(var(--card))" stroke="hsl(var(--border))" />
      <text x="250" y="90" font-family="sans-serif" font-size="14" fill="hsl(var(--foreground))" text-anchor="middle">Risk</text>
    </g>
    
    <g class="fade-in" style="animation-delay: 1.4s;">
      <rect x="120" y="190" width="120" height="40" rx="20" fill="hsl(var(--primary))" stroke="hsl(var(--border))" />
      <text x="180" y="215" font-family="sans-serif" font-size="14" fill="hsl(var(--primary-foreground))" text-anchor="middle">Your Plan</text>
    </g>
  </g>
</svg>
